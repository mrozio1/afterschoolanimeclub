        { id: 16, title: "Satellite Soul", meta: "Released: Autumn 2001", category: "limited", code: "#1101", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuK-5-nB0s2X6P8B6Nf4hX-W9Wv_i1l6E2V6V8G7D6S6v7z3B8wG-W0X-E2V6V8G7D6S6v7z3B8wG-W0X-E2V6V8G7D6S6v7z3B8wG-W0X" },
        { id: 17, title: "Glitch Garden", meta: "Released: Winter 2008", category: "best", code: "#0808", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuL-5-nB0s2X6P8B6Nf4hX-W9Wv_i1l6E2V6V8G7D6S6v7z3B8wG-W0X-E2V6V8G7D6S6v7z3B8wG-W0X-E2V6V8G7D6S6v7z3B8wG-W0X" },
        { id: 18, title: "Binary Echo", meta: "Released: Spring 1993", category: "classic", code: "#9393", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuM-5-nB0s2X6P8B6Nf4hX-W9Wv_i1l6E2V6V8G7D6S6v7z3B8wG-W0X-E2V6V8G7D6S6v7z3B8wG-W0X-E2V6V8G7D6S6v7z3B8wG-W0X" },
        { id: 19, title: "Signal Lost", meta: "Released: Summer 2009", category: "zines", code: "#0911", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuN-5-nB0s2X6P8B6Nf4hX-W9Wv_i1l6E2V6V8G7D6S6v7z3B8wG-W0X-E2V6V8G7D6S6v7z3B8wG-W0X-E2V6V8G7D6S6v7z3B8wG-W0X" },
        { id: 20, title: "Phantom Thread", meta: "Released: Spring 2022", category: "new", code: "#2222", img: "https://lh3.googleusercontent.com/aida-public/AB6AXuO-5-nB0s2X6P8B6Nf4hX-W9Wv_i1l6E2V6V8G7D6S6v7z3B8wG-W0X-E2V6V8G7D6S6v7z3B8wG-W0X-E2V6V8G7D6S6v7z3B8wG-W0X" }
    ];

    let itemsPerPage = 6;
    let visibleCount = itemsPerPage;
    let currentFilter = 'all';
    let cart = JSON.parse(localStorage.getItem('asac-cart') || '[]');

    function renderGrid() {
        const grid = document.getElementById('archive-grid');
        const filteredData = currentFilter === 'all' 
            ? archiveData 
            : archiveData.filter(item => item.category === currentFilter);
        
        grid.innerHTML = filteredData.map((item, index) => {
            const isVisible = index < visibleCount ? 'visible' : '';
            const panelClass = index % 2 === 0 ? 'manga-panel' : 'manga-panel-alt';
            return `
                <div class="archive-item ${isVisible} group relative bg-surface-container/50 border border-primary/20 ${panelClass} overflow-hidden transition-all hover:border-tertiary/50" data-id="${item.id}">
                    <div class="aspect-[4/5] relative overflow-hidden grayscale group-hover:grayscale-0 transition-all duration-500">
                        <img alt="${item.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" src="${item.img}"/>
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                            <div class="sold-out-stamp relative px-8 py-3 text-3xl font-manga italic uppercase tracking-tighter">Sold Out</div>
                        </div>
                        <div class="absolute inset-0 flex flex-col items-center justify-end p-8 gap-4 translate-y-20 group-hover:translate-y-0 transition-all duration-300">
                            <button class="w-full request-btn bg-tertiary text-on-tertiary px-4 py-3 text-sm font-manga italic hover:scale-105" onclick="requestRelease(this, '${item.title}')">REQUEST RE-RELEASE</button>
                            <button class="w-full request-btn bg-white/10 backdrop-blur-sm border border-white/20 text-white px-4 py-2 text-xs font-manga italic hover:bg-white/20" onclick="openQuickView(${item.id})">QUICK VIEW</button>
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-manga italic text-2xl uppercase tracking-tighter text-white">${item.title}</h3>
                            <span class="text-[10px] font-headline border border-fuchsia-500/30 px-2 py-0.5 text-fuchsia-400 uppercase">${item.code}</span>
                        </div>
                        <p class="text-[10px] text-white/40 font-headline uppercase tracking-widest">${item.meta}</p>
                    </div>
                </div>
            `;
        }).join('');

        const loadMoreBtn = document.getElementById('load-more-btn');
        if (visibleCount >= filteredData.length) {
            loadMoreBtn.innerText = 'END OF VAULT';
            loadMoreBtn.classList.add('opacity-50', 'cursor-not-allowed');
            loadMoreBtn.disabled = true;
        } else {
            loadMoreBtn.innerText = 'LOAD MORE ARCHIVES';
            loadMoreBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            loadMoreBtn.disabled = false;
        }
    }

    // Global Functions
    function toggleCart() {
        const drawer = document.getElementById('cart-drawer');
        drawer.classList.toggle('translate-x-full');
    }

    function updateCart() {
        localStorage.setItem('asac-cart', JSON.stringify(cart));
        const count = document.getElementById('cart-count');
        const container = document.getElementById('cart-items');
        const total = document.getElementById('cart-total');
        
        count.textContent = cart.length;
        
        if (cart.length === 0) {
            container.innerHTML = '<p class="text-slate-500 font-manga italic text-center py-10 opacity-50">STILL EMPTY...</p>';
            total.textContent = '$0.00';
            return;
        }

        let sum = 0;
        container.innerHTML = cart.map(item => {
            const price = item.price || 0;
            sum += price;
            return `
                <div class="flex gap-4 items-center bg-slate-900/50 p-3 border border-fuchsia-500/20">
                    <img src="${item.img}" class="w-16 h-16 object-cover border border-cyan-500/30">
                    <div class="flex-1">
                        <h4 class="font-manga text-sm text-white italic">${item.title}</h4>
                        <p class="text-cyan-400 font-manga text-xs">$${price.toFixed(2)}</p>
                    </div>
                    <button onclick="removeFromCart(${item.cartId})" class="text-fuchsia-500 hover:text-white">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                </div>
            `;
        }).join('');
        
        total.textContent = `$${sum.toFixed(2)}`;
    }

    function removeFromCart(cartId) {
        cart = cart.filter(item => item.cartId !== cartId);
        updateCart();
    }

    function showNotification(msg) {
        const container = document.getElementById('notifications');
        const toast = document.createElement('div');
        toast.className = 'toast bg-cyan-400 text-black px-6 py-3 font-manga italic text-sm shadow-[0_0_15px_rgba(0,242,255,0.4)] border-l-4 border-white';
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Modal Functions
    function openQuickView(id) {
        const p = archiveData.find(x => x.id === id);
        if (!p) return;
        document.getElementById('modal-img').src = p.img;
        document.getElementById('modal-title').textContent = p.title;
        document.getElementById('modal-meta').textContent = p.meta;
        const requestBtn = document.getElementById('modal-request-btn');
        requestBtn.innerText = 'REQUEST RE-RELEASE';
        requestBtn.classList.remove('opacity-50', 'pointer-events-none');
        requestBtn.onclick = () => {
            requestRelease(requestBtn, p.title);
        };
        document.getElementById('quick-view-modal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('quick-view-modal').classList.add('hidden');
    }

    function requestRelease(btn, title) {
        showNotification(`REQUEST SENT: ${title}`);
        btn.innerText = 'REQUEST SENT';
        btn.classList.add('opacity-50', 'pointer-events-none');
    }

    // Glitch Engine
    setInterval(() => {
        if (Math.random() > 0.95) {
            const glitchers = document.querySelectorAll('.glitch-text');
            glitchers.forEach(el => {
                const x = Math.random() * 4 - 2;
                el.style.transform = `translate(${x}px, 0)`;
                setTimeout(() => el.style.transform = 'none', 50);
            });
        }
    }, 100);

    // Sidebar Active State
    document.querySelectorAll('.sidebar-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.sidebar-btn').forEach(b => {
                b.classList.remove('bg-gradient-to-r', 'from-fuchsia-900/40', 'to-transparent', 'text-fuchsia-400', 'border-fuchsia-500', 'brightness-125', 'border-l-4');
                b.classList.add('text-slate-400');
            });
            this.classList.add('bg-gradient-to-r', 'from-fuchsia-900/40', 'to-transparent', 'text-fuchsia-400', 'border-fuchsia-500', 'brightness-125', 'border-l-4');
            this.classList.remove('text-slate-400');
            
            currentFilter = this.getAttribute('data-filter');
            visibleCount = itemsPerPage;
            renderGrid();
        });
    });

    // Load More Action
    const loadMoreBtn = document.getElementById('load-more-btn');
    loadMoreBtn.addEventListener('click', function() {
        visibleCount += itemsPerPage;
        renderGrid();
    });

    // Initial Load
    updateCart();
    renderGrid();
</script>
</body></html>
